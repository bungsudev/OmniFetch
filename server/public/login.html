<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniFetch — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-glow"></div>
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <span class="login-logo-icon">⚡</span>
        </div>
        <h1>HTTP Tracker <span>Pro</span></h1>
        <p class="login-subtitle">Admin Dashboard</p>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="email" name="email" placeholder="admin@tracker.local" required autofocus>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>

        <div id="login-error" class="error-message" style="display:none;"></div>

        <button type="submit" id="login-btn" class="btn-primary">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none;">⏳</span>
        </button>
      </form>

      <div class="login-footer">
        <p>Internal debugging tool • Not for public use</p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
