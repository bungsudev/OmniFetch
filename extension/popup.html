<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniFetch Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      -webkit-font-smoothing: antialiased;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #21262d;
      background: linear-gradient(135deg, #0d1117, #161b22);
    }

    .popup-logo {
      font-size: 24px;
      filter: drop-shadow(0 0 6px rgba(88,166,255,.5));
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      color: #f0f3f6;
    }

    .popup-title span {
      color: #58a6ff;
    }

    .popup-version {
      font-size: 10px;
      color: #484f58;
      margin-left: auto;
      background: #21262d;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* ============ MAIN SECTION ============ */

    .popup-body {
      padding: 16px;
    }

    /* Toggle */
    .toggle-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .toggle-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .toggle-label .label-main {
      font-size: 13px;
      font-weight: 600;
      color: #f0f3f6;
    }

    .toggle-label .label-sub {
      font-size: 11px;
      color: #484f58;
    }

    .toggle-label .label-sub.active {
      color: #3fb950;
    }

    .toggle-label .label-sub.inactive {
      color: #f85149;
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      cursor: pointer;
    }

    .toggle-switch input {
      display: none;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #30363d;
      border-radius: 26px;
      transition: all 250ms ease;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: #8b949e;
      border-radius: 50%;
      transition: all 250ms ease;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #238636;
      box-shadow: 0 0 12px rgba(63,185,80,.3);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(22px);
      background: #ffffff;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat-box {
      padding: 10px 12px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      text-align: center;
    }

    .stat-box .stat-num {
      font-size: 20px;
      font-weight: 800;
      color: #f0f3f6;
      line-height: 1.2;
    }

    .stat-box .stat-lbl {
      font-size: 10px;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .stat-box.blue .stat-num { color: #58a6ff; }
    .stat-box.green .stat-num { color: #3fb950; }

    /* Links */
    .popup-links {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .popup-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background 150ms;
    }

    .popup-link:hover {
      background: #1c2128;
    }

    .popup-link .link-icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
    }

    .popup-link .link-arrow {
      margin-left: auto;
      color: #30363d;
      font-size: 12px;
    }

    /* Footer */
    .popup-footer {
      padding: 10px 16px;
      border-top: 1px solid #21262d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .popup-footer span {
      font-size: 10px;
      color: #30363d;
    }

    /* Status indicator */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    .status-dot.on {
      background: #3fb950;
      box-shadow: 0 0 6px rgba(63,185,80,.5);
    }

    .status-dot.off {
      background: #f85149;
    }

    /* ============ RECORDER SECTION ============ */

    .recorder-section {
      margin-bottom: 12px;
    }

    .recorder-section .section-title {
      font-size: 10px;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .recorder-controls {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .rec-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #21262d;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .rec-btn-record {
      background: rgba(248,81,73,.1);
      color: #f85149;
      border-color: rgba(248,81,73,.3);
    }
    .rec-btn-record:hover { background: rgba(248,81,73,.2); }
    .rec-btn-record.recording {
      background: #f85149;
      color: #fff;
      animation: rec-pulse 1.5s infinite;
    }

    .rec-btn-play {
      background: rgba(63,185,80,.1);
      color: #3fb950;
      border-color: rgba(63,185,80,.3);
    }
    .rec-btn-play:hover { background: rgba(63,185,80,.2); }
    .rec-btn-play.playing {
      background: #3fb950;
      color: #fff;
    }

    .rec-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    @keyframes rec-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248,81,73,.4); }
      50% { box-shadow: 0 0 0 6px rgba(248,81,73,0); }
    }

    .rec-counter {
      text-align: center;
      font-size: 11px;
      color: #484f58;
      margin-bottom: 8px;
    }
    .rec-counter strong {
      color: #f85149;
    }

    .rec-list {
      max-height: 160px;
      overflow-y: auto;
    }

    .rec-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 11px;
      transition: background 150ms;
    }
    .rec-item:hover { background: #1c2128; }

    .rec-item-name {
      flex: 1;
      color: #c9d1d9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rec-item-count {
      color: #484f58;
      font-size: 10px;
    }

    .rec-item-actions {
      display: flex;
      gap: 2px;
    }

    .rec-action-btn {
      width: 22px;
      height: 22px;
      border: none;
      background: none;
      color: #8b949e;
      cursor: pointer;
      border-radius: 4px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms;
    }
    .rec-action-btn:hover {
      background: #21262d;
      color: #f0f3f6;
    }

    .speed-select {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 11px;
      padding: 4px 6px;
      font-family: inherit;
      cursor: pointer;
    }

    .rec-empty {
      text-align: center;
      color: #30363d;
      font-size: 11px;
      padding: 12px;
    }

    .rec-divider {
      height: 1px;
      background: #21262d;
      margin: 12px 0;
    }
  </style>
</head>
<body>

  <div class="popup-header">
    <span class="popup-logo">⚡</span>
    <div class="popup-title">OmniFetch <span>Pro</span></div>
    <span class="popup-version">v2.0.0</span>
  </div>

  <div class="popup-body">
    <!-- Toggle -->
    <div class="toggle-section">
      <div class="toggle-label">
        <div class="label-main">
          <span class="status-dot on" id="status-dot"></span>
          <span id="status-text">Tracking Active</span>
        </div>
        <div class="label-sub active" id="status-sub">Capturing all HTTP requests</div>
      </div>
      <label class="toggle-switch" id="toggle">
        <input type="checkbox" id="toggle-input" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box blue">
        <div class="stat-num" id="stat-requests">0</div>
        <div class="stat-lbl">Requests</div>
      </div>
      <div class="stat-box green">
        <div class="stat-num" id="stat-tab">0</div>
        <div class="stat-lbl">This Tab</div>
      </div>
    </div>

    <!-- Recorder -->
    <div class="rec-divider"></div>
    <div class="recorder-section">
      <div class="section-title">🎬 Automation Recorder</div>
      <div class="recorder-controls">
        <button class="rec-btn rec-btn-record" id="btn-record">
          <span>🔴</span> Record
        </button>
        <button class="rec-btn rec-btn-play" id="btn-play-last" disabled>
          <span>▶</span> Play Last
        </button>
        <select class="speed-select" id="playback-speed" title="Playback speed">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
          <option value="5">5x</option>
        </select>
      </div>
      <div class="rec-counter" id="rec-counter" style="display:none;">
        🔴 Recording: <strong id="rec-action-count">0</strong> actions captured
      </div>
      <div class="rec-list" id="rec-list"></div>
    </div>
    <div class="rec-divider"></div>

    <!-- Links -->
    <div class="popup-links">
      <button class="popup-link" id="btn-devtools">
        <span class="link-icon">🔧</span>
        Open DevTools Panel
        <span class="link-arrow">›</span>
      </button>
      <button class="popup-link" id="btn-admin">
        <span class="link-icon">📊</span>
        Open Admin Dashboard
        <span class="link-arrow">›</span>
      </button>
      <button class="popup-link" id="btn-clear">
        <span class="link-icon">🗑️</span>
        Clear Current Tab Data
        <span class="link-arrow">›</span>
      </button>
      <button class="popup-link" id="btn-clear-all">
        <span class="link-icon">💣</span>
        Clear All Data
        <span class="link-arrow">›</span>
      </button>
    </div>
  </div>

  <div class="popup-footer">
    <span>OmniFetch Pro</span>
    <span id="server-status">⏳ Checking server...</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
